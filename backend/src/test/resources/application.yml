spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:amha_test;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    username: sa
    password:

  data:
    redis:
      host: localhost
      port: 6379

  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: test-secret-key-for-jwt-testing-purposes-only
  expiration: 86400000

file:
  upload:
    path: ./test-uploads
    allowed-extensions: jpg,jpeg,png,gif
